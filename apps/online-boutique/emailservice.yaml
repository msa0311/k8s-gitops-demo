apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: online-boutique
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: v0.10.4
  annotations:
    app.kubernetes.io/managed-by: gitops
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
        app.kubernetes.io/name: emailservice
        app.kubernetes.io/part-of: online-boutique
        app.kubernetes.io/component: messaging
        app.kubernetes.io/version: v0.10.4
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: emailservice
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: emailservice
      containers:
        - name: server
          image: us-central1-docker.pkg.dev/google-samples/microservices-demo/emailservice:v0.10.4
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
            - name: GOMAXPROCS
              value: "2"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: emailservice
  namespace: online-boutique
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: online-boutique
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
spec:
  type: ClusterIP
  selector:
    app: emailservice
  ports:
    - name: grpc
      port: 5000
      targetPort: 8080
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: emailservice
  namespace: online-boutique
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: emailservice
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: emailservice
  namespace: online-boutique
  labels:
    app: emailservice
    app.kubernetes.io/name: emailservice
    app.kubernetes.io/part-of: online-boutique
spec:
  podSelector:
    matchLabels:
      app: emailservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: online-boutique
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
