apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: online-boutique
spec:
  replicas: 3   # was 2 - +1 so a single OOM restart cannot drop below the alert threshold (paired with PDB minAvailable:2)
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: us-central1-docker.pkg.dev/google-samples/microservices-demo/paymentservice:v0.10.4
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: "50051"
        - name: DISABLE_PROFILER
          value: "1"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=380"  # ~74% of 512Mi limit; GC before cgroup OOM, leaves headroom for native/GC/libuv/gRPC-core
        resources:
          requests:
            cpu: 50m  # right-sized 2026-07-23 (Prism): p95 ~4m / 30d-peak ~7m, ~7x headroom; 500m req was unschedulable (nodes 940m alloc, <305m free) and wedged the rollout
            memory: 256Mi  # was 192Mi - Node.js heap grows under load
          limits:
            cpu: 500m  # DEMO: raised to keep request<=limit valid
            memory: 512Mi  # was 384Mi - rev2 (384Mi/heap300) still OOMKilled 18:40Z; only ~84Mi headroom. Mirrors currencyservice 256->512Mi fix.
        # Startup probe: allows up to 45s for Node.js startup before liveness kicks in
        startupProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 8  # 5 + (5 * 8) = 45s max startup time
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice
  namespace: online-boutique
spec:
  type: ClusterIP
  selector:
    app: paymentservice
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: paymentservice
  namespace: online-boutique
spec:
  minAvailable: 2   # with replicas:3, tolerate 1 disruption; keeps >=2 ready so an OOM restart never trips DemoDeploymentDown
  selector:
    matchLabels:
      app: paymentservice
